<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Book Catalog Table</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th>Publication Year</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>The Hobbit</td>
          <td>J.R.R. Tolkien</td>
<td><span class="genre fantasy">Fantasy</span></td>
          <td>1937</td>
          
        </tr>

        <tr>
          <td>1984</td>
          <td>George Orwell</td>
<td><span class="genre dystopian">Dystopian</span></td>
          <td>1949</td>
        </tr>

        <tr>
          <td>To Kill a Mockingbird</td>
          <td>Harper Lee</td>
<td><span class="genre fiction">Fiction</span></td>
          <td > 1925</td>

        </tr>

        <tr>
          <td>The Great Gatsby</td>
          <td>F. Scott Fitzgerald</td>
<td><span class="genre classic">Classic</span></td>
          <td > 1925</td>
        </tr>

        <tr>
          <td>Harry Potter</td>
          <td>J.K. Rowling</td>
<td><span class="genre fantasy">Fantasy</span></td>
          <td>1997</td>
        </tr>
        
      </tbody>

      <tfoot>
        <tr>
          <td colspan="4">Total Books: 5</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
