<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Explore amazing travel destinations and curated travel packages worldwide.">
  <title>Travel Agency Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Explore Dream Destinations</h1>
  <p>Discover breathtaking locations and unforgettable journeys tailored for you.</p>

  <ul class="card-list">

  <h2>Top Itineraries</h2>

  <div class="card-container">

    <figure class="card">
      <a href="https://www.freecodecamp.org/learn" target="_blank">

      </a>
      <figcaption>Historic Rome Adventure</figcaption>
    </figure>

    <figure class="card">
      <a href="https://www.freecodecamp.org/learn" target="_blank">

      </a>
      <figcaption>Alpine Mountain Escape</figcaption>
    </figure>

    <figure class="card">
      <a href="https://www.freecodecamp.org/learn" target="_blank">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg" alt="Tropical sea beach">
