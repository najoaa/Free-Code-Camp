<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazing Science Videos</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333;
      line-height: 1.6;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      color: #1a73e8;
    }

    main > p {
      text-align: center;
      margin-bottom: 30px;
      font-size: 16px;
      color: #555;
    }

    section {
      background: #fff;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }

    section:hover {
      transform: translateY(-5px);
    }

    h2 {
      margin-bottom: 10px;
      color: #222;
    }

    section p {
      margin-bottom: 15px;
      color: #666;
    }

    iframe {
      width: 100%;
      height: 315px;
      border: none;
      border-radius: 8px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      iframe {
        height: 200px;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Amazing Science Discoveries</h1>
    <p>
      Explore some fascinating science topics through engaging videos.
    </p>

    <section>
      <h2>The Wonders of Space</h2>
      <p>Learn about the vast universe and galaxies.</p>
      <iframe 
        src="https://www.youtube.com/embed/libKVRa01L8"
        title="Space Documentary Video">
      </iframe>
    </section>

    <section>
      <h2>The Human Brain</h2>
      <p>Understand how the brain works.</p>
      <iframe 
        src="https://www.youtube.com/embed/5N3pWlA7e1M"
        title="Human Brain Video">
      </iframe>
    </section>

    <section>
      <h2>Future Technology</h2>
      <p>Explore innovations shaping the future.</p>
      <iframe 
        src="https://www.youtube.com/embed/2ePf9rue1Ao"
        title="Future Tech Video">
      </iframe>
    </section>

  </main>
</body>
</html>
