<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Audio and Video Lab</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>HTML Audio and Video Lab</h1>

  <!-- Video Section -->
  <section>
    <h2>Video Example</h2>
    <video controls loop width="640" poster="https://cdn.freecodecamp.org/curriculum/labs/past-event2.jpg">
      <source 
        src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" 
        type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </section>

  <!-- Audio Section -->
  <section>
    <h2>Audio Example</h2>
    <audio controls loop>
      <source 
        src="https://cdn.freecodecamp.org/curriculum/js-music-player/we-are-going-to-make-it.mp3" 
        type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </section>

</body>
</html>
